name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pip install pytest anyio httpx
      - run: pytest tests/ -v
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t genai-api .

  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Railway deploy
        run: sleep 60
      - name: Check health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.DEPLOY_URL }}/health)
          echo "Health status: $STATUS"
          if [ "$STATUS" != "200" ]; then exit 1; fi
          echo "Health check passed!"
      - name: Check info
        run: curl -s ${{ secrets.DEPLOY_URL }}/info