<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartResumeParser</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0e;
    --bg-secondary: #111318;
    --bg-input: #15181e;
    --bg-user: #1b2a40;
    --border: #1e2330;
    --border-focus: #4f8ff7;
    --text: #dfe4ed;
    --text-dim: #606b80;
    --accent: #4f8ff7;
    --accent-soft: rgba(79, 143, 247, 0.1);
    --green: #3dd68c;
    --red: #f75f5f;
    --orange: #f5a623;
    --code-bg: #0d0f14;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #4f8ff7, #7c3aed);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 16px; font-weight: 700; color: #fff;
    letter-spacing: -1px;
  }
  .header h1 {
    font-size: 15px; font-weight: 600;
    letter-spacing: -0.4px;
  }
  .header-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    background: var(--bg-secondary);
    padding: 3px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .status {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 11px; color: var(--text-dim);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--red);
    transition: background 0.4s;
  }
  .dot.ok { background: var(--green); box-shadow: 0 0 8px rgba(61,214,140,0.4); }
  .dot.loading { background: var(--orange); animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.25} }

  /* ── Chat ── */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scroll-behavior: smooth;
  }
  .chat::-webkit-scrollbar { width: 5px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: #1e2330; border-radius: 3px; }

  /* ── Welcome ── */
  .welcome {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex: 1; gap: 14px; text-align: center;
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)} }
  .welcome-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #4f8ff7, #7c3aed);
    border-radius: 16px; display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    box-shadow: 0 6px 24px rgba(79,143,247,0.2);
  }
  .welcome h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .welcome p { color: var(--text-dim); font-size: 13px; max-width: 400px; line-height: 1.6; }
  .example-btn {
    padding: 10px 16px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--bg-input); color: var(--text-dim); font-size: 12px;
    cursor: pointer; transition: all 0.2s; font-family: 'Sora', sans-serif;
    max-width: 360px; text-align: left; line-height: 1.45;
  }
  .example-btn:hover { border-color: var(--accent); color: var(--text); background: var(--accent-soft); }

  /* ── Messages ── */
  .msg {
    display: flex; gap: 12px;
    max-width: 720px; width: 100%; margin: 0 auto;
    animation: fadeIn 0.3s ease;
  }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 12px; font-weight: 700; margin-top: 2px;
  }
  .msg.user .msg-avatar { background: var(--bg-user); color: #93c5fd; }
  .msg.bot .msg-avatar { background: linear-gradient(135deg, #4f8ff7, #7c3aed); color: #fff; }
  .msg-body { flex: 1; min-width: 0; }
  .msg-role {
    font-family: 'Space Mono', monospace;
    font-size: 11px; font-weight: 700;
    color: var(--text-dim); margin-bottom: 5px;
    text-transform: uppercase; letter-spacing: 0.6px;
  }
  .msg-text { font-size: 13.5px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
  .msg-meta {
    margin-top: 6px; font-family: 'Space Mono', monospace;
    font-size: 10px; color: var(--text-dim);
  }

  /* ── JSON ── */
  .json-wrap {
    background: var(--code-bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; margin-top: 8px; position: relative;
    font-family: 'Space Mono', monospace; font-size: 11.5px;
    line-height: 1.7; overflow-x: auto; white-space: pre; color: #c9d1d9;
  }
  .json-wrap .k { color: #7dd3fc; }
  .json-wrap .s { color: #86efac; }
  .json-wrap .n { color: #fbbf24; }
  .json-wrap .b { color: #c084fc; }
  .copy-btn {
    position: absolute; top: 8px; right: 8px;
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg-input); color: var(--text-dim); font-size: 10px;
    cursor: pointer; font-family: 'Space Mono', monospace; transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--text); }

  /* ── Typing ── */
  .typing { display: flex; align-items: center; gap: 4px; padding: 6px 0; }
  .typing span {
    width: 6px; height: 6px; background: var(--text-dim);
    border-radius: 50%; animation: bounce 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)} }

  /* ── Input ── */
  .input-area {
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    background: var(--bg);
    flex-shrink: 0;
  }
  .input-wrap { max-width: 720px; margin: 0 auto; position: relative; }
  textarea {
    width: 100%; min-height: 48px; max-height: 180px;
    padding: 13px 50px 13px 16px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg-input); color: var(--text);
    font-size: 13.5px; font-family: 'Sora', sans-serif;
    line-height: 1.5; resize: none; outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--border-focus); }
  textarea::placeholder { color: var(--text-dim); }
  .send {
    position: absolute; right: 8px; bottom: 8px;
    width: 34px; height: 34px; border: none; border-radius: 9px;
    background: var(--accent); color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .send:hover { background: #3a7ae0; transform: scale(1.05); }
  .send:disabled { background: var(--border); cursor: not-allowed; transform: none; }
  .send svg { width: 16px; height: 16px; }
  .hint {
    text-align: center; font-family: 'Space Mono', monospace;
    font-size: 10px; color: var(--text-dim); margin-top: 6px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">SR</div>
    <div>
      <h1>SmartResumeParser</h1>
    </div>
    <span class="header-tag">v1.0</span>
  </div>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="statusTxt">connecting…</span>
  </div>
</div>

<div class="chat" id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">📄</div>
    <h2>Smart Resume Parser</h2>
    <p>Вставьте текст резюме — AI извлечёт структурированные данные и вернёт JSON.</p>
    <button class="example-btn" onclick="useExample()">
      💡 Попробовать: «John Doe, Software Engineer, MIT 2022…»
    </button>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" placeholder="Вставьте текст резюме…" rows="1"></textarea>
    <button class="send" id="sendBtn" onclick="send()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="hint">Enter — отправить · Shift+Enter — новая строка</div>
</div>

<script>
const API = window.location.origin;
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const dot = document.getElementById('dot');
const statusTxt = document.getElementById('statusTxt');
const welcomeEl = document.getElementById('welcome');
let ok = false, busy = false;

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
  sendBtn.disabled = !inputEl.value.trim() || !ok || busy;
});
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) send(); }
});

async function check() {
  dot.className = 'dot loading'; statusTxt.textContent = 'connecting…';
  try {
    const r = await fetch(`${API}/health`);
    if (r.ok) { dot.className = 'dot ok'; statusTxt.textContent = 'online'; ok = true; sendBtn.disabled = !inputEl.value.trim(); }
    else throw 0;
  } catch { dot.className = 'dot'; statusTxt.textContent = 'offline'; ok = false; sendBtn.disabled = true; }
}

function addMsg(role, content, meta) {
  if (welcomeEl) welcomeEl.remove();
  const m = document.createElement('div'); m.className = `msg ${role}`;
  const av = document.createElement('div'); av.className = 'msg-avatar'; av.textContent = role === 'user' ? 'U' : 'AI';
  const body = document.createElement('div'); body.className = 'msg-body';
  const rl = document.createElement('div'); rl.className = 'msg-role'; rl.textContent = role === 'user' ? 'YOU' : 'PARSER';
  const ct = document.createElement('div'); ct.className = 'msg-text';

  let isJson = false;
  if (role === 'bot') {
    try { const p = JSON.parse(content); content = JSON.stringify(p, null, 2); isJson = true; } catch {}
  }

  if (isJson) {
    const w = document.createElement('div'); w.className = 'json-wrap';
    w.innerHTML = highlight(content);
    const cp = document.createElement('button'); cp.className = 'copy-btn'; cp.textContent = 'Copy';
    cp.onclick = () => { navigator.clipboard.writeText(content); cp.textContent = 'Copied!'; setTimeout(() => cp.textContent = 'Copy', 1200); };
    w.appendChild(cp); ct.appendChild(w);
  } else { ct.textContent = content; }

  body.appendChild(rl); body.appendChild(ct);
  if (meta) { const mt = document.createElement('div'); mt.className = 'msg-meta'; mt.textContent = meta; body.appendChild(mt); }
  m.appendChild(av); m.appendChild(body);
  chatEl.appendChild(m); chatEl.scrollTop = chatEl.scrollHeight;
}

function addTyping() {
  const m = document.createElement('div'); m.className = 'msg bot'; m.id = 'typing';
  const av = document.createElement('div'); av.className = 'msg-avatar'; av.textContent = 'AI';
  const body = document.createElement('div'); body.className = 'msg-body';
  const rl = document.createElement('div'); rl.className = 'msg-role'; rl.textContent = 'PARSER';
  const t = document.createElement('div'); t.className = 'typing'; t.innerHTML = '<span></span><span></span><span></span>';
  body.appendChild(rl); body.appendChild(t); m.appendChild(av); m.appendChild(body);
  chatEl.appendChild(m); chatEl.scrollTop = chatEl.scrollHeight;
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || !ok || busy) return;
  busy = true; sendBtn.disabled = true;
  inputEl.value = ''; inputEl.style.height = 'auto';
  addMsg('user', text); addTyping();

  try {
    const r = await fetch(`${API}/generate`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: text, max_tokens: 512 }),
    });
    document.getElementById('typing')?.remove();
    if (!r.ok) {
      const e = await r.json().catch(() => ({ detail: `HTTP ${r.status}` }));
      addMsg('bot', `Error: ${e.detail || r.statusText}`);
    } else {
      const d = await r.json();
      addMsg('bot', d.response, `model: ${d.model} · tokens: ${d.tokens_used}`);
    }
  } catch (e) {
    document.getElementById('typing')?.remove();
    addMsg('bot', `Network error: ${e.message}`);
  }
  busy = false; sendBtn.disabled = !inputEl.value.trim();
}

function highlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"([^"]+)"(?=\s*:)/g, '"<span class="k">$1</span>"')
    .replace(/:\s*"([^"]*)"/g, ': "<span class="s">$1</span>"')
    .replace(/:\s*(\d+\.?\d*)/g, ': <span class="n">$1</span>')
    .replace(/:\s*(true|false)/g, ': <span class="b">$1</span>')
    .replace(/:\s*(null)/g, ': <span class="b">$1</span>');
}

function useExample() {
  inputEl.value = `John Doe\njohn.doe@gmail.com\n(555) 123-4567\nNew York, NY\n\nSummary\nExperienced software engineer with 3 years of backend development.\n\nEducation\nB.S. Computer Science, MIT, 2022\n\nWork Experience\nSoftware Engineer, Google, Jan 2022 – Present\n- Built microservices with Go and gRPC\n- Optimized database queries reducing latency by 40%\n\nIntern, Stripe, May 2021 – Aug 2021\n- Developed payment processing webhooks in Python\n\nSkills\nPython, Go, SQL, Docker, Kubernetes, gRPC, PostgreSQL\n\nLanguages\nEnglish, German`;
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
  sendBtn.disabled = !ok; inputEl.focus();
}

check();
</script>
</body>
</html>
